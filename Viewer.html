    color: 0x707070, // Dark grey surface

});
        
        
const loadingScreen = document.getElementById('loading-screen');
const progressBar = document.getElementById('loading-bar');
const progressLabel = document.getElementById('loading-progress-label');

const manager = new THREE.LoadingManager();

manager.onProgress = function ( url, loaded, total ) {
    const percentComplete = Math.round( ( loaded / total ) * 100 );
    
    progressBar.style.width = percentComplete + '%';
    progressLabel.innerHTML = `Loading ${percentComplete}%`;
    console.log( `Loading file: ${url}. Loaded ${loaded} of ${total} files.` );
};


manager.onLoad = function () {
    console.log( 'Loading complete!' );
    loadingScreen.classList.add('fade-out');
    loadingScreen.addEventListener('transitionend', onTransitionEnd);
};

function onTransitionEnd( event ) {
    event.target.removeEventListener( 'transitionend', onTransitionEnd );
    loadingScreen.remove();
}

manager.onError = function ( url ) {
    console.error( 'There was an error loading %s', url );
};
