<!DOCTYPE html>
<html lang="en">
<head>
    <title>OBJ File Loader</title>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="http://threejs.org/build/three.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/examples/js/loaders/FBXLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/examples/js/loaders/MTLLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/examples/js/loaders/OBJLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/examples/js/controls/TrackballControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/examples/js/libs/fflate.min.js"></script>

</head>
<body>
    
    <script>
        let scene, camera, renderer;
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera( 20, window.innerWidth / window.innerHeight, 1, 2000 );
        camera.position.z = -10;
        camera.position.x = 0;
        camera.position.y = -10;
        
        const ambientLight = new THREE.AmbientLight(0x404040, 1); // Soft white light, adjust intensity
        scene.add(ambientLight);

        const hemisphereLight = new THREE.HemisphereLight(0xffeedd, 0x404040, 0.5); // Sky color, ground color, intensity
        scene.add(hemisphereLight);
        
        const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
        directionalLight.position.set(-1, -1, -1).normalize(); // Adjust position as needed
        scene.add(directionalLight);
/*
        var light = new THREE.AmbientLight(0xffffff);
        scene.add(light);

        light = new THREE.HemisphereLight(0xffffff, 0x444444, 1.0);
        light.position.set(0, 1, 0);
        scene.add(light);

        var directionalLight = new THREE.DirectionalLight( 0xffeedd );
        directionalLight.position.set( 0, 1, 0 ).normalize();
        scene.add( directionalLight );
*/ 

        var objLoader = new THREE.OBJLoader();
        objLoader.load('./obj1/2dgs9.obj', function ( object ) {    
        scene.add(object);
          object.traverse(node => {
            if (node.material) {
              node.material.vertexColors = true;
            }
          });
        });

        
        
        renderer = new THREE.WebGLRenderer();
        renderer.setSize( window.innerWidth, window.innerHeight );
        renderer.setClearColor(0xffffff);
        document.body.appendChild( renderer.domElement );

        //controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls = new THREE.TrackballControls(camera, renderer.domElement);
        controls.addEventListener('change', renderer);
/*        controls.minPolarAngle = -Infinity; // Lower limit for vertical rotation
        controls.maxPolarAngle = Infinity;  // Upper limit for vertical rotation
        controls.minAzimuthAngle = -Infinity; // Lower limit for horizontal rotation
        controls.maxAzimuthAngle = Infinity;  // Upper limit for horizontal rotation
*/
        animate();

        function animate() {
            requestAnimationFrame( animate );
            controls.update(); // Call update in the animation loop
            renderer.render( scene, camera );
        }

    </script>
</body>
</html>
